<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>基金估值实时计算</title>
<style>
  :root{
    --bg:#f5f6f8; --card:#ffffff; --border:#e6e8eb; --text:#1f2329;
    --sub:#8a919e; --line:#f0f1f3; --accent:#3370ff; --accent-soft:#eaf0ff;
    --up:#e64545; --down:#22a06b; --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
    background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;padding-bottom:60px;}
  .wrap{max-width:1080px;margin:0 auto;padding:20px 16px;}
  header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:18px;}
  h1{font-size:20px;font-weight:600;display:flex;align-items:center;gap:8px;}
  h1 .dot{width:9px;height:9px;border-radius:50%;background:var(--down);animation:pulse 2s infinite;}
  @keyframes pulse{0%{opacity:1}50%{opacity:.3}100%{opacity:1}}
  .status{font-size:12px;color:var(--sub);display:flex;align-items:center;gap:10px;}
  .status .refresh{cursor:pointer;color:var(--accent);user-select:none;}
  .status .refresh:hover{text-decoration:underline;}

  .toolbar{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;
    box-shadow:var(--shadow);margin-bottom:18px;}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  input,select{border:1px solid var(--border);border-radius:8px;padding:8px 11px;font-size:14px;
    background:#fff;color:var(--text);outline:none;transition:border .15s;}
  input:focus,select:focus{border-color:var(--accent);}
  input::placeholder{color:#b7bcc4;}
  button{border:none;border-radius:8px;padding:8px 16px;font-size:14px;cursor:pointer;
    background:var(--accent);color:#fff;font-weight:500;transition:opacity .15s;white-space:nowrap;}
  button:hover{opacity:.88;}
  button.ghost{background:var(--accent-soft);color:var(--accent);}
  button.mini{padding:4px 10px;font-size:12px;background:transparent;color:var(--sub);}
  button.mini:hover{color:var(--accent);}
  .grow{flex:1;min-width:140px;}

  .group{background:var(--card);border:1px solid var(--border);border-radius:12px;
    box-shadow:var(--shadow);margin-bottom:16px;overflow:hidden;}
  .group-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;
    background:linear-gradient(180deg,#fafbff,#fff);border-bottom:1px solid var(--line);}
  .group-title{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px;}
  .group-title .cnt{font-size:12px;font-weight:400;color:var(--sub);background:var(--line);
    padding:1px 8px;border-radius:10px;}
  .group-ops{display:flex;gap:4px;}

  table{width:100%;border-collapse:collapse;}
  th,td{padding:11px 10px;text-align:right;font-variant-numeric:tabular-nums;}
  th{font-size:12px;color:var(--sub);font-weight:500;background:#fbfcfd;border-bottom:1px solid var(--line);}
  th:first-child,td:first-child{text-align:left;padding-left:16px;}
  td:last-child,th:last-child{padding-right:16px;}
  tbody tr{border-bottom:1px solid var(--line);transition:background .1s;}
  tbody tr:last-child{border-bottom:none;}
  tbody tr:hover{background:#fafbfd;}
  .fname{font-weight:500;}
  .fcode{font-size:12px;color:var(--sub);}
  .up{color:var(--up);}
  .down{color:var(--down);}
  .flat{color:var(--sub);}
  .big{font-size:15px;font-weight:600;}
  .tag{font-size:11px;padding:1px 6px;border-radius:4px;background:var(--accent-soft);color:var(--accent);margin-left:6px;}
  .del{cursor:pointer;color:#c9ccd1;font-size:16px;line-height:1;}
  .del:hover{color:var(--up);}
  .hold-toggle{cursor:pointer;color:var(--accent);font-size:12px;user-select:none;}
  .holds{background:#fafbfd;font-size:12px;color:var(--sub);}
  .holds-inner{padding:10px 16px;}
  .holds-inner .h-title{color:var(--sub);margin-bottom:6px;}
  .hbar{display:flex;flex-wrap:wrap;gap:6px 14px;}
  .hitem{display:flex;gap:6px;align-items:center;}
  .hitem .hn{color:var(--text);}
  .empty{text-align:center;color:var(--sub);padding:26px;font-size:13px;}
  .loading{color:var(--accent);}
  .err{color:var(--up);}
  .legend{font-size:11px;color:var(--sub);margin-top:14px;line-height:1.7;}
  .legend b{color:var(--text);}
  @media(max-width:620px){
    th:nth-child(4),td:nth-child(4),th:nth-child(6),td:nth-child(6){display:none;}
    .wrap{padding:14px 10px;}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1><span class="dot"></span>基金估值实时计算</h1>
    <div class="status">
      <span id="clock">--:--:--</span>
      <span class="refresh" id="btnRefresh">↻ 立即刷新</span>
      <label style="display:flex;align-items:center;gap:4px;cursor:pointer;">
        <input type="checkbox" id="autoChk" checked style="width:auto;padding:0;">自动
      </label>
    </div>
  </header>

  <div class="toolbar">
    <div class="row">
      <input class="grow" id="codeInput" placeholder="输入基金代码,如 161725 / 005827,多个用逗号或空格分隔" />
      <select id="groupSelect"></select>
      <button id="btnAdd">添加基金</button>
      <button class="ghost" id="btnNewGroup">+ 新建分组</button>
    </div>
  </div>

  <div id="groups"></div>

  <div class="legend">
    <b>说明:</b>「官方估值」来自天天基金实时估算(通常已相当准确);「自算估值」= 按该基金<b>最新季报前十大重仓股</b>的占净值比例 × 各股实时涨跌幅加权得出,仅覆盖已披露的重仓部分,可作参考对比。<br>
    数据每 <span id="intvHint">30</span> 秒自动刷新一次,交易时段(9:30–11:30、13:00–15:00)最有意义。全部数据保存在本地浏览器,不上传。
  </div>
</div>

<script>
/* ============ 配置 ============ */
const REFRESH_MS = 30000;
const LS_KEY = "fund_valuation_data_v1";

/* ============ 状态 ============ */
let state = load();          // { groups:[{id,name,funds:[code...]}], activeGroup:id }
let fundCache = {};          // code -> { name, gsz, gszzl, gztime, dwjz, jzrq, holdings:[{code,name,pct}], est, estValid }
let stockCache = {};         // secid(sh600519) -> { pct:changePercent }
let jsonpSeq = 0;

/* ============ 存取 ============ */
function load(){
  try{ const d = JSON.parse(localStorage.getItem(LS_KEY)); if(d&&d.groups) return d; }catch(e){}
  return { groups:[{id:"g"+Date.now(), name:"我的自选", funds:[]}], activeGroup:null };
}
function save(){ localStorage.setItem(LS_KEY, JSON.stringify(state)); }

/* ============ JSONP / script 注入通用工具 ============ */
function loadScript(url){
  return new Promise((resolve,reject)=>{
    const s=document.createElement("script");
    s.src=url; s.async=true;
    let done=false;
    const clean=()=>{ if(s.parentNode) s.parentNode.removeChild(s); };
    s.onload=()=>{ done=true; setTimeout(()=>{clean();resolve();},0); };
    s.onerror=()=>{ if(!done){clean();reject(new Error("load fail "+url));} };
    document.head.appendChild(s);
    setTimeout(()=>{ if(!done){clean();reject(new Error("timeout"));} }, 12000);
  });
}

/* ---- 1) 基金实时估值 (天天基金 fundgz) ---- */
window.jsonpgz = function(d){ window.__lastGz = d; };
async function fetchFundGz(code){
  window.__lastGz=null;
  try{
    await loadScript(`https://fundgz.1234567.com.cn/js/${code}.js?rt=${Date.now()}`);
  }catch(e){ /* 有些基金无估值,忽略 */ }
  return window.__lastGz;
}

/* ---- 2) 基金季度持仓 (天天基金 F10 jjcc) ---- */
/* 该接口返回 var apidata={content:"<html...>"}; 用注入方式拿到全局 apidata */
async function fetchHoldings(code){
  window.apidata=null;
  try{
    await loadScript(`https://fundf10.eastmoney.com/FundArchivesDatas.aspx?type=jjcc&code=${code}&topline=10&rt=${Date.now()}`);
  }catch(e){ return []; }
  const html = window.apidata && window.apidata.content;
  if(!html) return [];
  return parseHoldings(html);
}
function parseHoldings(html){
  const doc = new DOMParser().parseFromString(html, "text/html");
  // 取第一个季度表格(最新季度)
  const table = doc.querySelector("table.tzxq") || doc.querySelector("table");
  if(!table) return [];
  const rows = table.querySelectorAll("tbody tr");
  const list=[];
  rows.forEach(tr=>{
    const tds = tr.querySelectorAll("td");
    if(tds.length<7) return;
    const scode = (tds[1].textContent||"").trim();
    const sname = (tds[2].textContent||"").trim();
    // 占净值比例列: 含 % 的那一格
    let pct=null;
    tr.querySelectorAll("td").forEach(td=>{
      const t=(td.textContent||"").trim();
      if(/^\d+(\.\d+)?%$/.test(t)) pct=parseFloat(t);
    });
    if(scode && /^\d{5,6}$/.test(scode) && pct!=null){
      list.push({code:scode, name:sname, pct:pct});
    }
  });
  return list;
}

/* ---- 3) 股票实时行情 (腾讯 qt.gtimg.cn) ---- */
/* 返回 v_sh600519="...~涨跌幅在第32字段..."; 通过全局变量读取 */
function toSecid(scode){
  if(/^6/.test(scode)) return "sh"+scode;
  if(/^(0|3)/.test(scode)) return "sz"+scode;
  if(/^(4|8)/.test(scode)) return "bj"+scode; // 北交所
  return "sh"+scode;
}
async function fetchStocks(scodes){
  if(!scodes.length) return;
  const secids = scodes.map(toSecid);
  // 腾讯接口会定义 window.v_sh600519 = "..." 这类全局变量
  const url = `https://qt.gtimg.cn/q=${secids.join(",")}&r=${Date.now()}`;
  try{ await loadScript(url); }catch(e){ return; }
  secids.forEach(sid=>{
    const raw = window["v_"+sid];
    if(typeof raw==="string"){
      const arr = raw.split("~");
      // 字段: [3]现价 [4]昨收 [32]涨跌幅
      const chg = parseFloat(arr[32]);
      const price = parseFloat(arr[3]);
      const preClose = parseFloat(arr[4]);
      let pct = isNaN(chg)? ((price-preClose)/preClose*100) : chg;
      stockCache[sid] = { pct: isNaN(pct)?0:pct, price };
    }
  });
}

/* ============ 估值计算 ============ */
function computeEstimate(fund){
  const holds = fund.holdings||[];
  if(!holds.length) return {est:null, valid:false, covered:0};
  let weighted=0, covered=0;
  holds.forEach(h=>{
    const sid = toSecid(h.code);
    const st = stockCache[sid];
    if(st){ weighted += (h.pct/100) * st.pct; covered += h.pct; }
  });
  // weighted 已经是「按占净值比例加权的涨跌幅贡献(%)」
  return { est: weighted, valid: covered>0, covered };
}

/* ============ 数据刷新 ============ */
let refreshing=false;
async function refreshAll(){
  if(refreshing) return;
  refreshing=true;
  setStatus("刷新中…");
  const codes = new Set();
  state.groups.forEach(g=>g.funds.forEach(c=>codes.add(c)));

  // 1. 每只基金:估值 + (若无持仓)持仓
  for(const code of codes){
    if(!fundCache[code]) fundCache[code]={};
    const gz = await fetchFundGz(code);
    if(gz){
      Object.assign(fundCache[code], {
        name:gz.name, gsz:parseFloat(gz.gsz), gszzl:parseFloat(gz.gszzl),
        gztime:gz.gztime, dwjz:parseFloat(gz.dwjz), jzrq:gz.jzrq
      });
    }
    if(!fundCache[code].holdings || !fundCache[code].holdings.length){
      fundCache[code].holdings = await fetchHoldings(code);
    }
    renderGroups(); // 增量渲染,边拉边显示
  }

  // 2. 汇总所有重仓股,批量拉行情
  const stockSet = new Set();
  Object.values(fundCache).forEach(f=>(f.holdings||[]).forEach(h=>stockSet.add(h.code)));
  const stockArr=[...stockSet];
  for(let i=0;i<stockArr.length;i+=50){
    await fetchStocks(stockArr.slice(i,i+50));
  }

  // 3. 计算自算估值
  Object.values(fundCache).forEach(f=>{
    const r=computeEstimate(f);
    f.est=r.est; f.estValid=r.valid; f.covered=r.covered;
  });

  renderGroups();
  setStatus("已更新 "+new Date().toLocaleTimeString("zh-CN"));
  refreshing=false;
}

/* ============ 渲染 ============ */
function cls(v){ return v>0?"up":(v<0?"down":"flat"); }
function sign(v){ return v>0?"+":""; }
function fmtPct(v){ return (v==null||isNaN(v))?"—":(sign(v)+v.toFixed(2)+"%"); }
function fmtNum(v,d=4){ return (v==null||isNaN(v))?"—":v.toFixed(d); }

function renderGroups(){
  const wrap=document.getElementById("groups");
  if(!state.groups.length){ wrap.innerHTML='<div class="group"><div class="empty">还没有分组,点右上「+ 新建分组」开始。</div></div>'; return; }
  let html="";
  state.groups.forEach(g=>{
    html+=`<div class="group">
      <div class="group-head">
        <div class="group-title">${esc(g.name)}<span class="cnt">${g.funds.length} 只</span></div>
        <div class="group-ops">
          <button class="mini" onclick="renameGroup('${g.id}')">重命名</button>
          <button class="mini" onclick="delGroup('${g.id}')">删除组</button>
        </div>
      </div>`;
    if(!g.funds.length){
      html+=`<div class="empty">这个分组还没有基金,在上方输入代码并选择「${esc(g.name)}」添加。</div>`;
    }else{
      html+=`<table><thead><tr>
        <th>基金</th><th>官方估值</th><th>估算涨跌</th><th>净值(昨)</th>
        <th>自算涨跌</th><th>估值时间</th><th></th></tr></thead><tbody>`;
      g.funds.forEach(code=>{
        const f=fundCache[code]||{};
        const name=f.name||`<span class="loading">加载中…</span>`;
        const gszzl=f.gszzl, est=f.est;
        html+=`<tr>
          <td>
            <div class="fname">${name}</div>
            <div class="fcode">${code}${f.holdings&&f.holdings.length?`<span class="hold-toggle" onclick="toggleHold('${g.id}','${code}')"> · 持仓▾</span>`:""}</div>
          </td>
          <td class="big ${cls(gszzl)}">${fmtNum(f.gsz)}</td>
          <td class="big ${cls(gszzl)}">${fmtPct(gszzl)}</td>
          <td class="flat">${fmtNum(f.dwjz)}</td>
          <td class="${cls(est)}">${f.estValid?fmtPct(est):"—"}${f.estValid&&f.covered?`<span class="tag">覆盖${f.covered.toFixed(0)}%</span>`:""}</td>
          <td class="fcode">${f.gztime?f.gztime.slice(11):"—"}</td>
          <td><span class="del" onclick="delFund('${g.id}','${code}')">×</span></td>
        </tr>`;
        // 持仓明细行
        html+=`<tr id="hold-${g.id}-${code}" style="display:none;"><td colspan="7" class="holds"><div class="holds-inner">${renderHolds(f)}</div></td></tr>`;
      });
      html+=`</tbody></table>`;
    }
    html+=`</div>`;
  });
  wrap.innerHTML=html;
}
function renderHolds(f){
  if(!f.holdings||!f.holdings.length) return "暂无持仓数据";
  const q = f.holdings[0].__q || "";
  let s=`<div class="h-title">最新季报前十大重仓股(占净值比例 · 实时涨跌)</div><div class="hbar">`;
  f.holdings.forEach(h=>{
    const st=stockCache[toSecid(h.code)];
    const pct = st?st.pct:null;
    s+=`<div class="hitem"><span class="hn">${esc(h.name)}</span>
        <span class="fcode">${h.pct.toFixed(2)}%</span>
        <span class="${cls(pct)}">${fmtPct(pct)}</span></div>`;
  });
  s+=`</div>`;
  return s;
}
window.toggleHold=function(gid,code){
  const el=document.getElementById(`hold-${gid}-${code}`);
  if(el) el.style.display = el.style.display==="none"?"table-row":"none";
};

/* ============ 操作 ============ */
function refreshGroupSelect(){
  const sel=document.getElementById("groupSelect");
  sel.innerHTML=state.groups.map(g=>`<option value="${g.id}">${esc(g.name)}</option>`).join("");
  if(state.activeGroup) sel.value=state.activeGroup;
}
document.getElementById("btnAdd").onclick=addFund;
document.getElementById("codeInput").addEventListener("keydown",e=>{ if(e.key==="Enter") addFund(); });
function addFund(){
  const raw=document.getElementById("codeInput").value.trim();
  const gid=document.getElementById("groupSelect").value;
  if(!raw||!gid){ alert("请输入基金代码并选择分组"); return; }
  const g=state.groups.find(x=>x.id===gid);
  const codes=raw.split(/[\s,，、]+/).map(s=>s.trim()).filter(s=>/^\d{6}$/.test(s));
  if(!codes.length){ alert("未识别到有效的6位基金代码"); return; }
  codes.forEach(c=>{ if(!g.funds.includes(c)) g.funds.push(c); });
  document.getElementById("codeInput").value="";
  save(); renderGroups(); refreshAll();
}
window.delFund=function(gid,code){
  const g=state.groups.find(x=>x.id===gid);
  g.funds=g.funds.filter(c=>c!==code);
  save(); renderGroups();
};
document.getElementById("btnNewGroup").onclick=function(){
  const name=prompt("分组名称:","新分组");
  if(!name) return;
  const id="g"+Date.now();
  state.groups.push({id,name:name.trim(),funds:[]});
  state.activeGroup=id; save(); refreshGroupSelect(); renderGroups();
};
window.renameGroup=function(gid){
  const g=state.groups.find(x=>x.id===gid);
  const name=prompt("新名称:",g.name);
  if(name){ g.name=name.trim(); save(); refreshGroupSelect(); renderGroups(); }
};
window.delGroup=function(gid){
  if(state.groups.length<=1){ alert("至少保留一个分组"); return; }
  if(!confirm("确认删除该分组及其所有基金?")) return;
  state.groups=state.groups.filter(x=>x.id!==gid);
  if(state.activeGroup===gid) state.activeGroup=state.groups[0].id;
  save(); refreshGroupSelect(); renderGroups();
};

/* ============ 辅助 ============ */
function esc(s){ return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function setStatus(t){ /* clock 区旁边不额外显示,保留接口 */ }
function tickClock(){ document.getElementById("clock").textContent=new Date().toLocaleTimeString("zh-CN"); }

/* ============ 初始化 ============ */
document.getElementById("intvHint").textContent=(REFRESH_MS/1000);
document.getElementById("btnRefresh").onclick=refreshAll;
if(!state.activeGroup && state.groups.length) state.activeGroup=state.groups[0].id;
refreshGroupSelect();
renderGroups();
refreshAll();
setInterval(tickClock,1000); tickClock();
let timer=setInterval(()=>{ if(document.getElementById("autoChk").checked) refreshAll(); }, REFRESH_MS);
</script>
</body>
</html>
